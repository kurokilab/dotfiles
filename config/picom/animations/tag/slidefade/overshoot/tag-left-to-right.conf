# Tag / workspace switch (slidefade): windows being mapped slide in from the
# left with a fade; windows leaving the tag slide out to the left while fading.
# Short offset/duration so it reads as motion, not travel. Keep this @include
# LAST in the rules list (no trailing comma).
{
    match = "window_type = 'normal' && !class_g = 'slop' && !class_g = 'vxwm' && !class_g = 'dmenu'";
    animations = (
        {
            triggers = ["show"];
            opacity = {
                curve = "cubic-bezier(0.22,1,0.36,1)";
                duration = 0.3;
                start = 0;
                end = "window-raw-opacity";
            };
            blur-opacity = "opacity";
            shadow-opacity = "opacity";
            offset-x = {
                curve = "cubic-bezier(0.22,1.2,0.36,1)";
                duration = 0.3;
                start = -120;
                end = 0;
            };
            shadow-offset-x = "offset-x";
        },
        {
            triggers = ["hide"];
            opacity = {
                curve = "cubic-bezier(0.22,1,0.36,1)";
                duration = 0.3;
                start = "window-raw-opacity-before";
                end = 0;
            };
            blur-opacity = "opacity";
            shadow-opacity = "opacity";
            offset-x = {
                curve = "cubic-bezier(0.22,1.2,0.36,1)";
                duration = 0.3;
                start = 0;
                end = -120;
            };
            shadow-offset-x = "offset-x";
        }
    )
}
