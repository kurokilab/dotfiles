{
    match = "(window_type = 'normal' || window_type = 'dialog' || window_type = 'utility' || window_type = 'unknown') && !class_g = 'slop' && !class_g = 'vxwm' && !class_g = 'dmenu'";
    animations = (
        {
            triggers = ["open"];
            opacity = {
                curve = "cubic-bezier(0.22,1.0,0.36,1)";
                duration = 0.65;
                start = 0.4;
                end = 1;
            };
            blur-opacity = "opacity";
            shadow-opacity = "opacity";

            scale-x = {
                curve = "cubic-bezier(0.22,1.0,0.36,1)";
                duration = 0.65;
                start = 0.4;
                end = 1;
            };
            scale-y = "scale-x";

            offset-x = "(1 - scale-x) / 2 * window-width";
            offset-y = "(1 - scale-y) / 2 * window-height";

            shadow-scale-x = "scale-x";
            shadow-scale-y = "scale-y";
            shadow-offset-x = "offset-x";
            shadow-offset-y = "offset-y";
        }
    )
},
