# New window appears: fade + scale up from 70% with a subtle overshoot.
# Tuned for low-end hardware (short duration); animates real app windows only.
{
    match = "window_type = 'normal' && !class_g = 'slop' && !class_g = 'vxwm' && !class_g = 'dmenu'";
    animations = (
        {
            triggers = ["open"];
            opacity = {
                curve = "cubic-bezier(0,1,1,1)";
                duration = 0.28;
                start = 0;
                end = "window-raw-opacity";
            };
            blur-opacity = "opacity";
            shadow-opacity = "opacity";

            scale-x = {
                curve = "cubic-bezier(0,1.3,1,1)";
                duration = 0.28;
                start = 0.7;
                end = 1;
            };
            scale-y = "scale-x";

            offset-x = "(1 - scale-x) / 2 * window-width";
            offset-y = "(1 - scale-y) / 2 * window-height";

            shadow-scale-x = "scale-x";
            shadow-scale-y = "scale-y";
            shadow-offset-x = "offset-x";
            shadow-offset-y = "offset-y";
        }
    )
},
