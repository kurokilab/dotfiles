
backend = "glx";
vsync = true;

use-damage = true;

corner-radius = 12;

shadow = true;
shadow-radius = 18;
shadow-opacity = 0.55;
shadow-offset-x = -18;
shadow-offset-y = -16;
shadow-color = "#1d2021";

blur: {
  method = "dual_kawase";
  strength = 6;
  background = false;
  background-frame = false;
  background-fixed = false;
}

fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 6;

animations = (
  {
    triggers = [ "open", "show" ];
    preset = "appear";
    duration = 0.22;
    scale = 0.94;
    match = "!class_g = 'slop'";
  },
  {
    triggers = [ "close", "hide" ];
    preset = "disappear";
    duration = 0.20;
    scale = 0.94;
    match = "!class_g = 'slop'";
  },
  {
    triggers = [ "geometry" ];
    preset = "geometry-change";
    duration = 0.1;
    match = "!class_g = 'slop'";
  }
)

rules: (
  {
    # slop draws the region-selection rectangle for maim/screenshot.
    # Strip every effect so the selection box tracks the cursor 1:1
    # instead of lagging behind fades, shadows and rounded corners.
    match = "class_g = 'slop'";
    shadow = false;
    fade = false;
    blur-background = false;
    corner-radius = 0;
    opacity = 1.0;
    dim = 0.0;
  },
  {
    match = "!focused && !class_g = 'slop'";
    opacity = 0.92;
    dim = 0.08;
  },
  {
    match = "fullscreen";
    opacity = 1.0;
    dim = 0.0;
    corner-radius = 0;
    shadow = false;
  },
  {
    match = "window_type = 'tooltip'";
    fade = false;
    shadow = true;
    opacity = 0.85;
    full-shadow = false;
    blur-background = false;
  },
  {
    match = "window_type = 'dock'    || "
            "window_type = 'desktop' || "
            "_GTK_FRAME_EXTENTS@";
    blur-background = false;
  },
  {
    match = "window_type = 'dock' || "
            "window_type = 'desktop' || "
            "class_g     = 'vxwm' || "
            "class_g     = 'dmenu' || "
            "window_type = 'unknown'";
    corner-radius = 0;
    shadow = false;
    blur-background = false;
    opacity = 1.0;
    dim = 0.0;
  },
  {
    match = "name = 'Notification'   || "
            "class_g = 'Conky'       || "
            "class_g ?= 'Notify-osd' || "
            "class_g = 'Cairo-clock' || "
            "_GTK_FRAME_EXTENTS@";
    shadow = false;
  },
  {
    match = "window_type = 'popup_menu' || "
            "window_type = 'dropdown_menu' || "
            "window_type = 'menu'";
    shadow = true;
    fade = false;
    corner-radius = 8;
    opacity = 1.0;
    dim = 0.0;
  },
  {
    match = "window_type = 'menu' && _GTK_FRAME_EXTENTS@";
    shadow = false;
    corner-radius = 0;
    fade = false;
    blur-background = false;
    opacity = 1.0;
    dim = 0.0;
  }
)

unredir-if-possible = true;

detect-transient = true;
detect-client-leader = true;
detect-rounded-corners = true;
detect-client-opacity = true;

use-ewmh-active-win = true;
