# libinput input configuration for X11

Section "InputClass"
    Identifier "libinput keyboard"
    MatchIsKeyboard "on"
    MatchDevicePath "/dev/input/event*"
    Driver "libinput"

    Option "XkbLayout" "us,ru"
    Option "XkbOptions" "grp:caps_toggle"
EndSection

Section "InputClass"
    Identifier "libinput pointer"
    MatchIsPointer "on"
    MatchDevicePath "/dev/input/event*"
    Driver "libinput"

    # Pointer speed / sensitivity: -1 (slowest) .. 0 (default) .. 1 (fastest).
    Option "AccelSpeed" "0"

    # Acceleration profile:
    #   "adaptive" - speed scales with how fast you move (default, desktop-like)
    #   "flat"     - raw 1:1 movement, no acceleration (preferred for gaming/aim)
    Option "AccelProfile" "adaptive"

    # Reverse scroll direction (touchscreen-style). "false" = traditional.
    Option "NaturalScrolling" "false"

    # Middle-button emulation (press left+right together). Off by default.
    Option "MiddleEmulation" "off"
EndSection

Section "InputClass"
    Identifier "libinput touchpad"
    MatchIsTouchpad "on"
    MatchDevicePath "/dev/input/event*"
    Driver "libinput"

    # Touchpad speed / sensitivity: -1 .. 0 .. 1.
    Option "AccelSpeed" "0.3"
    Option "AccelProfile" "adaptive"

    # Tap-to-click and two-finger / edge behaviour.
    Option "Tapping" "on"
    Option "NaturalScrolling" "true"
    Option "ScrollMethod" "twofinger"
    Option "ClickMethod" "clickfinger"

    # Ignore the touchpad briefly while typing to avoid stray cursor jumps.
    Option "DisableWhileTyping" "on"
EndSection
