{
match = "window_type = 'normal'"
  animations = (
    {
      triggers = ["show"];
      opacity = {
        curve = "cubic-bezier(0.22,1,0.36,1)";
        duration = 0.7;
        start = 0;
        end = 1;
      };
      blur-opacity = "opacity";
      shadow-opacity = "opacity";
      offset-y = {
          curve = "cubic-bezier(0.22, 1, 0.36, 1)";
          duration = 0.7;
          start = -1080;
          end = 0;
      };

      shadow-offset-y = "offset-y";
    },
    {
      triggers = ["hide"];
        opacity = {
          curve = "cubic-bezier(0.22,1,0.36,1)";
          duration = 0.7;
          start = 1;
          end = 0;
        };
        blur-opacity = "opacity";
        shadow-opacity = "opacity";
        # offset-x = {
        #   curve = "cubic-bezier(0.22, 1, 0.36, 1)";
        #   duration = 0.7;
        #   start = 0;
        #   end = -1920;
        # };
        #
        # shadow-offset-x = "offset-x";
        offset-y = {
          curve = "cubic-bezier(0.22, 1, 0.36, 1)";
          duration = 0.7;
          start = 0;
          end = -1080;
        };

        shadow-offset-y = "offset-y";
    }
  )
}

